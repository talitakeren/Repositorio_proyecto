name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 3"
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL para OWASP ZAP baseline (opcional — anula stack local)"
        required: false
        type: string

permissions:
  contents: read
  security-events: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bash scripts/run-security-audit.sh
      - uses: actions/upload-artifact@v4
        with:
          name: security-audit-json
          path: docs/reportes/security/
          retention-days: 30

  secret-scan:
    name: Detección de secretos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Buscar patrones sensibles
        run: |
          set +e
          FOUND=0
          if git grep -nE '(JWT_SECRET|MONGO_URI|password)\s*=\s*[^<].*' -- ':!*.example' ':!*.md' ':!*.yml' ':!.github/**' 2>/dev/null; then
            echo "::warning::Posibles secretos en código — revisar manualmente"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "No se detectaron patrones obvios de secretos hardcodeados."
          fi

  zap-baseline-external:
    name: OWASP ZAP — URL externa
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target_url != '' || vars.ZAP_TARGET_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ github.event.inputs.target_url || vars.ZAP_TARGET_URL }}
          cmd_options: "-a"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-external
          path: |
            report_html.html
            report_json.json
          retention-days: 14

  zap-baseline-stack:
    name: OWASP ZAP — stack en runner
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target_url == '' && vars.ZAP_TARGET_URL == '' }}
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: |
          npm ci
          cd frontend && npm ci
          cd ../backend && npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Iniciar backend
        working-directory: backend
        env:
          NODE_ENV: production
          PORT: 5001
          MONGO_URI: mongodb://127.0.0.1:27017/HorariosAcademicos
          JWT_SECRET: ci_zap_scan_secret_min_32_chars_xx
          CLIENT_URL: http://localhost:5173
        run: |
          npm run seed || true
          node src/server.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5001/api/health && break
            sleep 2
          done

      - name: Preview frontend
        working-directory: frontend
        run: npm run preview -- --port 5173 --host &

      - name: Esperar frontend
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:5173 > /dev/null && exit 0
            sleep 2
          done
          echo "Timeout esperando preview"
          exit 1

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:5173/login
          cmd_options: "-a"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-stack
          path: |
            report_html.html
            report_json.json
          retention-days: 14
