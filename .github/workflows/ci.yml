name: CI SGOHA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend — lint y build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - run: npm run build

  backend-quality:
    name: Backend — sintaxis y dependencias
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  tests:
    name: Pruebas Jest (raíz)
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: tests/reports/coverage/
          retention-days: 14

  dependency-audit:
    name: Auditoría de dependencias
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit — frontend
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high
        continue-on-error: true
      - name: npm audit — backend
        working-directory: backend
        run: |
          npm ci
          npm audit --audit-level=high
        continue-on-error: true
      - name: Guardar reportes JSON
        run: bash scripts/run-security-audit.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: docs/reportes/security/
          retention-days: 30

  accessibility:
    name: Accesibilidad — Cypress axe
    runs-on: ubuntu-latest
    needs: frontend-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Instalar dependencias
        run: |
          npm ci
          cd frontend && npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Preview frontend
        working-directory: frontend
        run: npm run preview -- --port 5173 --host &
      - name: Esperar servidor
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:5173 > /dev/null && exit 0
            sleep 2
          done
          echo "Timeout esperando preview en :5173"
          exit 1
      - name: Ejecutar pruebas a11y
        run: npm run test:a11y
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: a11y-screenshots
          path: cypress/screenshots/
          retention-days: 7
