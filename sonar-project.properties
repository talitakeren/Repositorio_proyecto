# ============================================================
# SGOHA — Análisis estático SonarQube / SonarCloud
# Proyecto unificado: frontend + backend + suite de pruebas en raíz
# ============================================================

sonar.projectKey=sgoha
sonar.projectName=SGOHA
sonar.projectVersion=2.0.0

# Código fuente principal
sonar.sources=frontend/src,backend/src

# Pruebas automatizadas (Jest en raíz + Cypress)
sonar.tests=tests,cypress
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.cy.js

sonar.sourceEncoding=UTF-8

# Exclusiones
sonar.exclusions=\
**/node_modules/**,\
**/dist/**,\
**/build/**,\
**/coverage/**,\
**/tests/reports/**,\
**/cypress/videos/**,\
**/cypress/screenshots/**,\
**/backend/routes/**,\
**/backend/db/**,\
**/backend/services/scheduler.js,\
**/seed/**,\
**/docs/evidencias/**

# Cobertura LCOV (generar con: npm run test:coverage)
sonar.javascript.lcov.reportPaths=\
tests/reports/coverage/backend-unit/lcov.info,\
tests/reports/coverage/backend-integration/lcov.info,\
tests/reports/coverage/frontend-unit/lcov.info,\
tests/reports/coverage/frontend-integration/lcov.info

# Node / JavaScript
sonar.javascript.node.maxspace=4096
